        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #E50914;
            --text: #ffffff;
            --secondary: #a1a1a6;
            --search-bg: #2c2c2e;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            padding: env(safe-area-inset-top) 0 40px 0;
            -webkit-tap-highlight-color: transparent;
        }
        .header { 
            position: sticky; top: 0; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px 15px; z-index: 100; border-bottom: 0.5px solid #333;
        }
        h1 { font-size: 24px; font-weight: 800; margin: 0 0 15px 0; color: var(--accent); letter-spacing: -0.5px; }
        #searchInput {
            width: 100%; padding: 12px 15px; border-radius: 12px; border: none;
            background: var(--search-bg); color: white; font-size: 16px; box-sizing: border-box;
            outline: none; -webkit-appearance: none;
        }
        .container { padding: 0 15px; }
        .category-section { margin-top: 30px; }
        .section-title { font-size: 16px; color: var(--secondary); margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { 
            background: var(--card); border-radius: 14px; border: 0.5px solid #2c2c2e; 
            text-decoration: none; color: white; display: flex; flex-direction: column; 
            padding: 18px 12px; transition: all 0.1s;
        }
        .card:active { transform: scale(0.96); background: #262626; }
        .label { font-size: 13px; font-weight: 600; line-height: 1.2; margin-bottom: 6px; min-height: 32px; display: flex; align-items: center; }
        .code-num { font-size: 10px; color: var(--secondary); font-family: monospace; }
        .hidden { display: none !important; }
        .no-results { text-align: center; padding: 50px; color: var(--secondary); display: none; }
    </style>
</head>

        function init() {
            const container = document.getElementById('mainContainer');
            data.forEach(sec => {
                let sectionHtml = `<div class="category-section">
                    <div class="section-title">${sec.t}</div>
                    <div class="grid">`;
                
                sec.items.forEach(item => {
                    sectionHtml += `
                        <a href="https://www.netflix.com/browse/genre/${item.c}" target="_blank" class="card">
                            <span class="label">${item.n}</span>
                            <span class="code-num">Code: ${item.c}</span>
                        </a>`;
                });
                
                sectionHtml += `</div></div>`;
                container.innerHTML += sectionHtml;
            });
        }

        function filter() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            let sections = document.querySelectorAll('.category-section');
            let anyVisible = false;

            cards.forEach(card => {
                if (card.innerText.toLowerCase().includes(input)) {
                    card.classList.remove('hidden');
                    anyVisible = true;
                } else {
                    card.classList.add('hidden');
                }
            });

            sections.forEach(sec => {
                let visibleCards = sec.querySelectorAll('.card:not(.hidden)');
                sec.style.display = (visibleCards.length === 0) ? 'none' : 'block';
            });
            document.getElementById('noResults').style.display = anyVisible ? 'none' : 'block';
        }

        init();
